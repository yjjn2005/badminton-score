<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0,maximum-scale=1.0,user-scalable=no"/>
<title>🏸 배드민턴 조 리그</title>
<style>
:root{
  --bg:#0f0f1a;
  --surface:#1a1a2e;
  --surface2:#16213e;
  --card:#1e2140;
  --card2:#252847;
  --border:#2d3060;
  --gold:#f5c842;
  --gold2:#e8a000;
  --accent:#7c6fcd;
  --accent2:#5a4fcf;
  --pink:#e040a0;
  --green:#00d68f;
  --red:#ff4757;
  --text:#f0f0ff;
  --text2:#a0a8d0;
  --text3:#5a6080;
  --radius:18px;
  --radius-sm:12px;
}
*{box-sizing:border-box;-webkit-tap-highlight-color:transparent;margin:0;padding:0;}
html,body{height:100%;background:var(--bg);color:var(--text);font-family:-apple-system,BlinkMacSystemFont,'Noto Sans KR',sans-serif;}
button,input,textarea{font-family:inherit;}
button{cursor:pointer;border:none;background:none;color:inherit;}
input,textarea{color:var(--text);}
input::placeholder,textarea::placeholder{color:var(--text3);}

/* ── 스크롤바 ── */
::-webkit-scrollbar{width:4px;height:4px;}
::-webkit-scrollbar-track{background:transparent;}
::-webkit-scrollbar-thumb{background:var(--border);border-radius:99px;}

/* ── 레이아웃 ── */
.page{max-width:480px;margin:0 auto;padding:0 14px calc(24px + env(safe-area-inset-bottom));}

/* ── 헤더 ── */
.app-header{
  position:sticky;top:0;z-index:100;
  background:linear-gradient(135deg,#0d0d20,#1a1040);
  border-bottom:1px solid var(--border);
  padding:14px 16px calc(14px + env(safe-area-inset-top,0px));
  padding-top:calc(14px + env(safe-area-inset-top,0px));
  display:flex;align-items:center;justify-content:space-between;
  backdrop-filter:blur(20px);
}
.header-logo{display:flex;align-items:center;gap:8px;font-size:17px;font-weight:900;letter-spacing:-.3px;}
.header-logo span{background:linear-gradient(135deg,#f5c842,#e040a0);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;}
.header-actions{display:flex;align-items:center;gap:8px;}
.icon-btn{width:36px;height:36px;border-radius:10px;background:var(--card);border:1px solid var(--border);display:flex;align-items:center;justify-content:center;font-size:16px;color:var(--text2);}
.icon-btn:active{opacity:.7;}
.badge-pill{background:var(--red);color:#fff;font-size:11px;font-weight:800;padding:3px 9px;border-radius:99px;}

/* ── 카드 ── */
.card{background:var(--card);border-radius:var(--radius);border:1px solid var(--border);margin-bottom:12px;overflow:hidden;}
.card-pad{padding:18px;}
.card-sep{height:1px;background:var(--border);}

/* ── 그라디언트 배너 ── */
.banner-grad{
  background:linear-gradient(135deg,#1a0533,#0d1a40);
  border-radius:var(--radius);border:1px solid var(--border);
  padding:20px;margin-bottom:14px;position:relative;overflow:hidden;
}
.banner-grad::before{
  content:'';position:absolute;inset:0;
  background:radial-gradient(ellipse at 80% 20%,rgba(124,111,205,.3),transparent 60%),
             radial-gradient(ellipse at 20% 80%,rgba(224,64,160,.2),transparent 60%);
}
.banner-grad > *{position:relative;}

/* ── 통계 ── */
.stat-num{font-size:32px;font-weight:900;line-height:1;}
.stat-label{font-size:12px;color:var(--text2);margin-top:2px;}

/* ── 진행바 ── */
.prog{height:5px;background:rgba(255,255,255,.08);border-radius:99px;overflow:hidden;margin-top:10px;}
.prog-fill{height:100%;border-radius:99px;transition:width .6s cubic-bezier(.4,0,.2,1);}

/* ── 조 탭 ── */
.grp-scroll{display:flex;gap:8px;overflow-x:auto;padding:12px 14px;scrollbar-width:none;}
.grp-scroll::-webkit-scrollbar{display:none;}
.grp-chip{
  flex-shrink:0;padding:8px 18px;border-radius:99px;
  font-size:13px;font-weight:700;white-space:nowrap;
  background:var(--card);border:1px solid var(--border);color:var(--text2);
  transition:all .2s;
}
.grp-chip.on{color:#fff;border-color:transparent;box-shadow:0 4px 16px rgba(0,0,0,.4);}
.grp-chip:active{transform:scale(.95);}
.grp-chip-add{border-style:dashed;color:var(--accent);border-color:var(--accent);}

/* ── 선수 태그 ── */
.p-tag{padding:5px 12px;border-radius:99px;font-size:12px;font-weight:700;display:inline-block;margin:3px;}

/* ── 액션 버튼 3개 ── */
.action-row{display:grid;grid-template-columns:repeat(3,1fr);gap:10px;padding:4px 0 6px;}
.action-btn{
  display:flex;flex-direction:column;align-items:center;gap:8px;
  background:var(--card2);border:1px solid var(--border);
  border-radius:var(--radius-sm);padding:16px 8px;
  transition:all .18s;font-family:inherit;
}
.action-btn:active{transform:scale(.95);opacity:.8;}
.action-btn .a-icon{font-size:28px;line-height:1;}
.action-btn .a-label{font-size:12px;font-weight:700;color:var(--text2);}
.action-btn.primary-action{background:linear-gradient(135deg,var(--accent2),var(--accent));border-color:transparent;}
.action-btn.primary-action .a-label{color:#fff;}

/* ── 입력 방법 2버튼 ── */
.method-row{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:14px;}
.method-card{
  display:flex;align-items:center;gap:12px;padding:14px;
  border-radius:var(--radius-sm);border:1px solid;cursor:pointer;
  background:none;font-family:inherit;text-align:left;transition:all .18s;
}
.method-card:active{transform:scale(.97);}
.method-card.photo{border-color:#f5c84260;background:linear-gradient(135deg,rgba(245,200,66,.07),rgba(228,160,0,.03));}
.method-card.manual{border-color:#7c6fcd60;background:linear-gradient(135deg,rgba(124,111,205,.07),rgba(90,79,207,.03));}
.method-card .mc-icon{font-size:26px;flex-shrink:0;}
.method-card .mc-title{font-size:13px;font-weight:700;color:var(--text);}
.method-card .mc-sub{font-size:11px;color:var(--text2);margin-top:2px;}

/* ── 경기 카드 ── */
.match-card{
  background:var(--card2);border:1px solid var(--border);
  border-radius:var(--radius-sm);padding:14px;margin-bottom:8px;
}
.match-card.clickable{cursor:pointer;transition:all .18s;}
.match-card.clickable:active{transform:scale(.98);}
.match-card.done-card{border-left:3px solid var(--green);}
.match-card.todo-card{border-left:3px solid var(--gold);}
.match-head{display:flex;justify-content:space-between;align-items:center;margin-bottom:10px;}
.match-no-badge{font-size:11px;font-weight:700;background:var(--card);color:var(--text2);padding:3px 10px;border-radius:99px;}
.status-done{font-size:11px;font-weight:700;background:rgba(0,214,143,.12);color:var(--green);padding:3px 10px;border-radius:99px;}
.status-todo{font-size:11px;font-weight:700;background:rgba(245,200,66,.12);color:var(--gold);padding:3px 10px;border-radius:99px;}
.match-teams{display:flex;align-items:center;gap:8px;}
.team-box{flex:1;padding:10px 8px;border-radius:10px;text-align:center;font-size:13px;font-weight:700;background:var(--card);color:var(--text2);}
.team-box.win{background:linear-gradient(135deg,rgba(124,111,205,.2),rgba(90,79,207,.1));color:#b8b0ff;border:1px solid rgba(124,111,205,.3);}
.team-box.win-r{background:linear-gradient(135deg,rgba(224,64,160,.2),rgba(255,71,87,.1));color:#ff9ec8;border:1px solid rgba(224,64,160,.3);}
.vs-score{min-width:50px;text-align:center;font-size:18px;font-weight:900;color:var(--text);}
.vs-txt{font-size:12px;color:var(--text3);font-weight:700;}
.match-bye{font-size:11px;color:var(--text3);text-align:center;margin-top:8px;}

/* ── 순위표 ── */
.rank-table{width:100%;border-collapse:collapse;}
.rank-table th{font-size:11px;font-weight:700;color:var(--text3);padding:8px 10px;text-align:center;background:var(--surface);}
.rank-table th:nth-child(2){text-align:left;}
.rank-table td{padding:12px 10px;text-align:center;border-top:1px solid rgba(255,255,255,.04);}
.rank-table td:nth-child(2){text-align:left;font-weight:700;color:var(--text);}
.rank-1{background:linear-gradient(90deg,rgba(245,200,66,.08),transparent);}
.rank-2{background:linear-gradient(90deg,rgba(160,168,208,.05),transparent);}
.rank-3{background:linear-gradient(90deg,rgba(228,160,0,.06),transparent);}
.pts-cell{font-size:17px;font-weight:900;color:var(--gold);}
.win-cell{font-weight:700;color:#7c6fcd;}
.loss-cell{color:var(--red);}

/* ── 결과 종합 ── */
.result-row{display:flex;align-items:center;padding:11px 0;border-bottom:1px solid rgba(255,255,255,.04);}
.result-row:last-child{border-bottom:none;}
.r-no{font-size:11px;color:var(--text3);width:38px;flex-shrink:0;}
.r-t1,.r-t2{flex:1;font-size:12px;font-weight:700;color:var(--text2);}
.r-t1{text-align:right;}
.r-t2{text-align:left;}
.r-t1.w{color:#b8b0ff;}
.r-t2.w{color:#ff9ec8;}
.r-score{min-width:54px;text-align:center;font-size:15px;font-weight:900;color:var(--text);padding:0 6px;}

/* ── 우승 배너 ── */
.champ-card{
  background:linear-gradient(135deg,#2a1500,#1a0030);
  border:1px solid rgba(245,200,66,.3);border-radius:var(--radius);
  padding:24px;text-align:center;margin-bottom:14px;position:relative;overflow:hidden;
}
.champ-card::before{
  content:'';position:absolute;inset:0;
  background:radial-gradient(ellipse at 50% 0%,rgba(245,200,66,.2),transparent 60%);
}
.champ-card>*{position:relative;}
.champ-name{font-size:28px;font-weight:900;background:linear-gradient(135deg,#f5c842,#ff9800);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;}

/* ── 순위 미리보기 ── */
.rank-preview{display:flex;gap:12px;padding:12px 18px;background:rgba(255,255,255,.03);border-top:1px solid var(--border);}
.rp-item{display:flex;align-items:center;gap:7px;}
.rp-name{font-size:12px;font-weight:800;}
.rp-pts{font-size:11px;color:var(--text3);}

/* ── 범용 버튼 ── */
.btn{display:inline-flex;align-items:center;justify-content:center;gap:6px;font-weight:700;border-radius:var(--radius-sm);cursor:pointer;transition:all .18s;border:none;font-family:inherit;}
.btn:active{transform:scale(.96);}
.btn-gold{background:linear-gradient(135deg,var(--gold),var(--gold2));color:#1a1000;padding:14px;font-size:16px;width:100%;border-radius:14px;}
.btn-accent{background:linear-gradient(135deg,var(--accent2),var(--accent));color:#fff;padding:14px;font-size:15px;width:100%;border-radius:14px;}
.btn-ghost{background:var(--card2);color:var(--text2);padding:10px 18px;font-size:13px;border:1px solid var(--border);}
.btn-red{background:rgba(255,71,87,.15);color:var(--red);padding:10px 18px;font-size:13px;border:1px solid rgba(255,71,87,.3);}
.btn-outline{background:transparent;color:var(--text2);padding:10px 18px;font-size:13px;border:1px solid var(--border);}
.btn-block{width:100%;padding:14px;border-radius:14px;}
.btn-sm{padding:7px 14px;font-size:12px;border-radius:10px;}

/* ── 입력 ── */
.inp{background:var(--card2);border:1px solid var(--border);border-radius:var(--radius-sm);padding:13px 16px;font-size:15px;width:100%;outline:none;color:var(--text);transition:border-color .2s;}
.inp:focus{border-color:var(--accent);}
.inp-label{font-size:12px;font-weight:700;color:var(--text3);margin-bottom:7px;display:block;}
.inp-row{display:flex;gap:8px;}
.score-inp{background:var(--card2);border:1px solid var(--border);border-radius:var(--radius-sm);padding:14px;font-size:34px;font-weight:900;text-align:center;width:100%;outline:none;color:var(--text);}
.score-inp:focus{border-color:var(--accent);}

/* ── 모달 ── */
.modal-bg{position:fixed;inset:0;background:rgba(0,0,0,.75);z-index:200;display:flex;align-items:flex-end;justify-content:center;backdrop-filter:blur(4px);}
.modal{background:linear-gradient(180deg,#1e2140,#161830);border-radius:24px 24px 0 0;border-top:1px solid var(--border);width:100%;max-width:480px;padding:20px 20px calc(32px + env(safe-area-inset-bottom));max-height:88vh;overflow-y:auto;animation:slideUp .22s cubic-bezier(.4,0,.2,1);}
@keyframes slideUp{from{transform:translateY(50px);opacity:0}to{transform:translateY(0);opacity:1}}
.modal-handle{width:36px;height:4px;background:var(--border);border-radius:99px;margin:0 auto 18px;}
.modal-title{font-size:18px;font-weight:900;color:var(--text);margin-bottom:4px;}
.modal-close{font-size:24px;color:var(--text3);line-height:1;}

/* ── 승팀 선택 ── */
.winner-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:16px;}
.winner-btn{padding:18px 10px;border-radius:var(--radius-sm);border:1px solid var(--border);text-align:center;cursor:pointer;background:var(--card2);font-family:inherit;transition:all .18s;}
.winner-btn:active{transform:scale(.97);}
.winner-btn.sel1{border-color:var(--accent);background:rgba(124,111,205,.12);}
.winner-btn.sel2{border-color:var(--pink);background:rgba(224,64,160,.12);}
.wt-label{font-size:11px;color:var(--text3);margin-bottom:5px;}
.wt-name{font-size:13px;font-weight:700;color:var(--text);}
.winner-btn.sel1 .wt-name{color:#b8b0ff;}
.winner-btn.sel2 .wt-name{color:#ff9ec8;}
.win-badge{font-size:13px;margin-top:8px;}

/* ── OCR ── */
.ocr-prog{height:8px;background:var(--card2);border-radius:99px;overflow:hidden;margin-top:10px;}
.ocr-bar{height:100%;background:linear-gradient(90deg,var(--accent2),var(--accent));border-radius:99px;transition:width .3s;}
.name-chip{display:inline-block;padding:7px 16px;border-radius:99px;font-size:13px;font-weight:700;border:1px solid;cursor:pointer;margin:4px;transition:all .15s;}
.name-chip.on{border-color:var(--accent);background:rgba(124,111,205,.15);color:#b8b0ff;}
.name-chip.off{border-color:var(--border);background:transparent;color:var(--text3);text-decoration:line-through;}
.ocr-ref{background:rgba(245,200,66,.07);border:1px solid rgba(245,200,66,.2);border-radius:var(--radius-sm);padding:12px;margin-bottom:12px;}

/* ── 알림 박스 ── */
.info-box{background:rgba(124,111,205,.1);border:1px solid rgba(124,111,205,.25);border-radius:10px;padding:11px 14px;font-size:13px;font-weight:700;color:#b8b0ff;margin-bottom:12px;}
.warn-box{background:rgba(255,71,87,.08);border:1px solid rgba(255,71,87,.2);border-radius:10px;padding:11px 14px;font-size:13px;color:var(--red);margin-bottom:12px;}

/* ── 선수 행 ── */
.p-row{display:flex;align-items:center;gap:10px;padding:11px 0;border-bottom:1px solid rgba(255,255,255,.05);}
.p-row:last-child{border-bottom:none;}
.p-num{font-size:12px;color:var(--text3);width:20px;text-align:center;}
.p-name{flex:1;font-size:14px;font-weight:600;color:var(--text);}
.p-del{font-size:16px;color:var(--text3);padding:4px 6px;}
.p-del:hover{color:var(--red);}

/* ── 탭바 ── */
.tab-bar{
  background:var(--surface);border-bottom:1px solid var(--border);
  display:flex;position:sticky;top:60px;z-index:90;
}
.tab-btn{flex:1;display:flex;flex-direction:column;align-items:center;padding:11px 4px;gap:3px;font-size:11px;font-weight:700;color:var(--text3);border-bottom:2px solid transparent;background:none;transition:all .2s;font-family:inherit;}
.tab-btn.on{color:var(--gold);border-bottom-color:var(--gold);}
.tab-btn .ti{font-size:18px;line-height:1;}

/* ── 다이얼로그 ── */
.dialog-bg{position:fixed;inset:0;background:rgba(0,0,0,.7);z-index:300;display:flex;align-items:center;justify-content:center;padding:20px;backdrop-filter:blur(4px);}
.dialog{background:var(--surface);border:1px solid var(--border);border-radius:20px;padding:24px;width:100%;max-width:320px;text-align:center;}
.dialog h3{font-size:17px;font-weight:900;margin-bottom:8px;}
.dialog p{font-size:13px;color:var(--text2);margin-bottom:20px;line-height:1.6;}
.dialog-btns{display:grid;grid-template-columns:1fr 1fr;gap:8px;}

/* ── 빠른 이동 ── */
.quick-grid{display:flex;flex-wrap:wrap;gap:7px;}
.quick-chip{padding:7px 14px;border-radius:99px;font-size:12px;font-weight:700;background:var(--card2);border:1px solid var(--border);color:var(--text2);}
.quick-chip:active{transform:scale(.95);}

/* ── 설정 패널 ── */
.settings-panel{
  position:fixed;inset:0;z-index:150;background:rgba(0,0,0,.6);backdrop-filter:blur(6px);
  display:flex;align-items:flex-start;justify-content:flex-end;
}
.settings-box{
  background:var(--surface);border-left:1px solid var(--border);
  width:260px;height:100%;padding:calc(env(safe-area-inset-top,14px) + 14px) 20px 24px;
  display:flex;flex-direction:column;gap:0;
  animation:slideRight .2s ease-out;
}
@keyframes slideRight{from{transform:translateX(100%)}to{transform:translateX(0)}}
.settings-title{font-size:20px;font-weight:900;margin-bottom:24px;padding-top:8px;
  background:linear-gradient(135deg,var(--gold),var(--pink));-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;}
.settings-item{display:flex;align-items:center;gap:12px;padding:14px 0;border-bottom:1px solid rgba(255,255,255,.05);cursor:pointer;}
.settings-item:last-child{border-bottom:none;}
.settings-item .s-icon{font-size:20px;width:32px;text-align:center;}
.settings-item .s-label{font-size:14px;font-weight:700;color:var(--text);}
.settings-item .s-sub{font-size:11px;color:var(--text3);margin-top:1px;}

/* ── 콘페티 ── */
.conf-box{position:fixed;inset:0;pointer-events:none;z-index:999;overflow:hidden;}
.conf-p{position:absolute;border-radius:2px;}
@keyframes fall{0%{transform:translateY(-10px) rotate(0);opacity:1}100%{transform:translateY(110vh) rotate(720deg);opacity:0}}

@media print{.no-print{display:none!important;}html,body{background:#fff;color:#000;}}
</style>
</head>
<body>
<div id="root"></div>
<script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
<script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
<script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
<script src="https://unpkg.com/tesseract.js@5/dist/tesseract.min.js"></script>
<script type="text/babel">
const {useState,useEffect,useReducer,useRef}=React;

/* ── 상수 ── */
const MAX=10;
const COLORS=['#7c6fcd','#e040a0','#f97316','#f5c842','#00d68f','#0ea5e9','#8b5cf6','#ef4444','#14b8a6','#84cc16'];
const uid=()=>Math.random().toString(36).slice(2,9);

/* ── 대진표 생성 ── */
function genSchedule(ids){
  const p=ids,n=p.length;
  if(n===4)return[
    {team1:[p[0],p[1]],team2:[p[2],p[3]],bye:[]},
    {team1:[p[0],p[2]],team2:[p[1],p[3]],bye:[]},
    {team1:[p[0],p[3]],team2:[p[1],p[2]],bye:[]},
  ];
  if(n===5)return[
    {team1:[p[0],p[1]],team2:[p[2],p[3]],bye:[p[4]]},
    {team1:[p[0],p[2]],team2:[p[3],p[4]],bye:[p[1]]},
    {team1:[p[0],p[3]],team2:[p[1],p[4]],bye:[p[2]]},
    {team1:[p[0],p[4]],team2:[p[1],p[2]],bye:[p[3]]},
    {team1:[p[1],p[3]],team2:[p[2],p[4]],bye:[p[0]]},
  ];
  if(n===6)return[
    {team1:[p[0],p[1],p[2]],team2:[p[3],p[4],p[5]],bye:[]},
    {team1:[p[0],p[3],p[4]],team2:[p[1],p[2],p[5]],bye:[]},
    {team1:[p[0],p[1],p[5]],team2:[p[2],p[3],p[4]],bye:[]},
    {team1:[p[0],p[2],p[4]],team2:[p[1],p[3],p[5]],bye:[]},
    {team1:[p[0],p[2],p[3]],team2:[p[1],p[4],p[5]],bye:[]},
  ];
  return[];
}

/* ── 개인 순위 (점수 내림차순) ── */
function calcRank(players,games){
  const s={};
  players.forEach(p=>{s[p.id]={player:p,wins:0,losses:0,played:0,pts:0};});
  games.filter(g=>g.winner).forEach(g=>{
    (g.winner===1?g.team1:g.team2).forEach(id=>{if(s[id]){s[id].wins++;s[id].pts+=2;s[id].played++;}});
    (g.winner===1?g.team2:g.team1).forEach(id=>{if(s[id]){s[id].losses++;s[id].played++;}});
  });
  return Object.values(s).sort((a,b)=>b.pts-a.pts||a.losses-b.losses||b.wins-a.wins);
}

/* ── OCR ── */
async function doOCR(file,onProg){
  const r=await Tesseract.recognize(file,'kor+eng',{logger:m=>{if(m.status==='recognizing text')onProg(Math.round(m.progress*100));}});
  return r.data.text;
}
function extractNames(t){return[...new Set(t.split(/[\s\n,|\-\/\\0-9\.()]+/).map(s=>s.trim()).filter(s=>/^[가-힣]{2,4}$/.test(s)))];}

/* ── 상태 ── */
const INIT={groups:[],nav:'home',navData:null};
function load(){try{const s=localStorage.getItem('bdm_v9');return s?JSON.parse(s):INIT;}catch{return INIT;}}
function reducer(st,ac){
  switch(ac.type){
    case 'NAV':return{...st,nav:ac.to,navData:ac.data||null};
    case 'SET_TAB':return{...st,navData:{...st.navData,tab:ac.tab}};
    case 'ADD_GROUP':{
      if(st.groups.length>=MAX)return st;
      const games=genSchedule(ac.playerIds).map((g,i)=>({id:uid(),no:i+1,...g,winner:null,s1:null,s2:null}));
      const grp={id:uid(),name:ac.name,playerIds:ac.playerIds,players:ac.players,color:COLORS[st.groups.length%COLORS.length],games};
      return{...st,groups:[...st.groups,grp],nav:'group',navData:{gid:grp.id,tab:'bracket'}};
    }
    case 'DEL_GROUP':return{...st,groups:st.groups.filter(g=>g.id!==ac.id),nav:'home',navData:null};
    case 'RECORD':{
      const groups=st.groups.map(g=>{
        if(g.id!==ac.gid)return g;
        return{...g,games:g.games.map(gm=>gm.id===ac.gameId?{...gm,winner:ac.winner,s1:ac.s1,s2:ac.s2}:gm)};
      });
      return{...st,groups};
    }
    case 'RESET':return INIT;
    default:return st;
  }
}

/* ── OCR 모달 ── */
function OcrModal({title,mode,onResult,onClose}){
  const [stage,setStage]=useState('idle');
  const [prog,setProg]=useState(0);
  const [raw,setRaw]=useState('');
  const [names,setNames]=useState([]);
  const ref=useRef();
  const handle=async e=>{
    const f=e.target.files?.[0];if(!f)return;
    setStage('ocring');setProg(0);
    try{const t=await doOCR(f,setProg);setRaw(t);if(mode==='names')setNames(extractNames(t));setStage('done');}
    catch{setStage('err');}
  };
  const toggle=n=>setNames(p=>p.includes(n)?p.filter(x=>x!==n):[...p,n]);
  return(
    <div className="modal-bg" onClick={onClose}>
      <div className="modal" onClick={e=>e.stopPropagation()}>
        <div className="modal-handle"/>
        <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:18}}>
          <span className="modal-title">{title}</span>
          <button className="modal-close" onClick={onClose}>✕</button>
        </div>
        {stage==='idle'&&(
          <div style={{textAlign:'center',padding:'28px 0'}}>
            <div style={{fontSize:56,marginBottom:14}}>📸</div>
            <p style={{color:'#a0a8d0',fontSize:14,lineHeight:1.7,marginBottom:24}}>{mode==='names'?'선수 이름이 적힌 대진표를\n촬영하세요':'수기 결과지를 촬영하면\n참고용으로 표시됩니다'}</p>
            <button className="btn btn-accent" style={{padding:'13px 32px',fontSize:15,width:'auto'}} onClick={()=>ref.current.click()}>📷 사진 촬영 / 갤러리</button>
            <input ref={ref} type="file" accept="image/*" capture="environment" style={{display:'none'}} onChange={handle}/>
          </div>
        )}
        {stage==='ocring'&&(
          <div style={{textAlign:'center',padding:'36px 0'}}>
            <div style={{fontSize:50,marginBottom:14}}>🔍</div>
            <p style={{fontWeight:700,color:'#a0a8d0',marginBottom:14}}>텍스트 인식 중... {prog}%</p>
            <div className="ocr-prog"><div className="ocr-bar" style={{width:`${prog}%`}}/></div>
          </div>
        )}
        {stage==='err'&&(
          <div style={{textAlign:'center',padding:'28px 0'}}>
            <div style={{fontSize:46,marginBottom:10}}>❌</div>
            <p style={{color:'#a0a8d0',marginBottom:14}}>인식에 실패했습니다</p>
            <button className="btn btn-ghost" onClick={()=>setStage('idle')}>다시 시도</button>
          </div>
        )}
        {stage==='done'&&mode==='names'&&(
          <div>
            <p style={{fontSize:13,color:'#a0a8d0',marginBottom:12}}>인식된 이름 탭하여 선택 ({names.length}명)</p>
            {names.length===0&&<p style={{color:'#f97316',fontSize:13,marginBottom:10}}>이름을 찾지 못했습니다. 아래 원문을 수정하세요.</p>}
            <div style={{marginBottom:12}}>{names.map(n=><button key={n} className={`name-chip ${names.includes(n)?'on':'off'}`} onClick={()=>toggle(n)}>{n}</button>)}</div>
            <textarea value={raw} onChange={e=>{setRaw(e.target.value);setNames(extractNames(e.target.value));}}
              style={{width:'100%',height:80,fontSize:12,background:'#1a1a2e',border:'1px solid #2d3060',borderRadius:10,padding:10,resize:'none',fontFamily:'monospace',color:'#a0a8d0',outline:'none',marginBottom:12}}/>
            <button className="btn btn-accent btn-block" disabled={names.length<2} style={{opacity:names.length<2?.4:1}} onClick={()=>onResult(names)}>
              {names.length}명 추가하기
            </button>
          </div>
        )}
        {stage==='done'&&mode==='result'&&(
          <div>
            <div className="ocr-ref">
              <p style={{fontSize:12,fontWeight:700,color:'#f5c842',marginBottom:6}}>📋 인식 결과 (참고용)</p>
              <p style={{fontSize:12,color:'#a0a8d0',whiteSpace:'pre-wrap',fontFamily:'monospace',lineHeight:1.5}}>{raw.slice(0,500)}</p>
            </div>
            <button className="btn btn-accent btn-block" onClick={()=>onResult(raw)}>확인 — 직접 입력하기</button>
          </div>
        )}
      </div>
    </div>
  );
}

        <button className="btn btn-ghost btn-sm" onClick={()=>dispatch({type:'NAV',to:'home'})}>← 홈</button>
        <span style={{fontSize:18,fontWeight:900}}>{nextNum}조 만들기</span>
        <span style={{fontSize:12,color:'#3a4060',marginLeft:'auto'}}>{st.groups.length}/{MAX}</span>
      </div>

      <div className="card">
        <div className="card-pad">
          <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:14}}>
            <span style={{fontWeight:700,fontSize:15}}>참가 선수 <span style={{color:'#7c6fcd'}}>{n}</span><span style={{color:'#2d3060'}}>/6</span></span>
            <button className="btn btn-sm" style={{background:'rgba(245,200,66,.1)',color:'#f5c842',border:'1px solid rgba(245,200,66,.25)'}}
              disabled={n>=6} onClick={()=>setShowOcr(true)}>📷 사진으로 추가</button>
          </div>
          {n>=4&&<div className="info-box">✨ {n}명 → {info}</div>}
          {players.map((p,i)=>(
            <div key={p.id} className="p-row">
              <span className="p-num">{i+1}</span>
              <span className="p-name">{p.name}</span>
              <button className="p-del" onClick={()=>remove(p.id)}>✕</button>
            </div>
          ))}
          {n<6&&(
            <div className="inp-row" style={{marginTop:14}}>
              <input className="inp" style={{flex:1}} placeholder="✏️  이름 직접 입력 (수동)"
                value={input} onChange={e=>setInput(e.target.value)} onKeyDown={e=>e.key==='Enter'&&add()}/>
              <button className="btn btn-accent" onClick={add}>추가</button>
            </div>
          )}
        </div>
      </div>

      {n>=4&&(
        <div className="card">
          <div className="card-pad">
            <label className="inp-label">조 이름</label>
            <input className="inp" style={{marginBottom:14}} placeholder={`${nextNum}조`}
              value={grpName} onChange={e=>setGrpName(e.target.value)}/>
            <button className="btn btn-gold" onClick={create}>🏸  {grpName||nextNum+'조'} 생성!</button>
          </div>
        </div>
      )}
      {n<4&&<div className="warn-box">최소 4명 필요합니다 (현재 {n}명, {4-n}명 더 추가하세요)</div>}
    </div>
  );
}

/* ════════════════════
   조 상세
════════════════════ */
function GroupScreen({st,dispatch}){
  const {gid,tab}=st.navData||{};
  const grp=st.groups.find(g=>g.id===gid);
  if(!grp){dispatch({type:'NAV',to:'home'});return null;}
  const pmap={};grp.players.forEach(p=>{pmap[p.id]=p.name;});
  const done=grp.games.filter(g=>g.winner).length,total=grp.games.length;
  const rank=calcRank(grp.players,grp.games),allDone=done===total&&total>0;
  const [ocrMode,setOcrMode]=useState(null);
  const [ocrRef,setOcrRef]=useState('');
  const [gameModal,setGameModal]=useState(null);
  const [confetti,setConfetti]=useState(false);

  return(
    <div>
      <Confetti on={confetti}/>
      {/* 탭바 */}
      <div className="tab-bar no-print">
        <button className="tab-btn" onClick={()=>dispatch({type:'NAV',to:'home'})}>
          <span className="ti">←</span><span>목록</span>
        </button>
        {[{id:'bracket',icon:'📋',label:'대진표'},{id:'results',icon:'📝',label:'경기결과'},{id:'dashboard',icon:'📊',label:'대시보드'}].map(t=>(
          <button key={t.id} className={`tab-btn ${tab===t.id?'on':''}`} onClick={()=>dispatch({type:'SET_TAB',tab:t.id})}>
            <span className="ti">{t.icon}</span><span>{t.label}</span>
          </button>
        ))}
      </div>

      {/* 조 정보 바 */}
      <div style={{padding:'12px 14px 0'}}>
        <div style={{display:'flex',alignItems:'center',gap:8,marginBottom:8}}>
          <span style={{width:10,height:10,borderRadius:'50%',background:grp.color,display:'inline-block',flexShrink:0}}/>
          <span style={{fontSize:17,fontWeight:900}}>{grp.name}</span>
          <span style={{fontSize:12,color:'#5a6080'}}>{grp.playerIds.length}명 · {done}/{total}경기</span>
        </div>
        <div className="prog"><div className="prog-fill" style={{width:`${total?done/total*100:0}%`,background:grp.color}}/></div>
      </div>

      {/* ── 대진표 ── */}
      {tab==='bracket'&&(
        <div className="page" style={{paddingTop:12}}>
          {ocrMode==='names'&&<OcrModal title="📷 대진표 사진 인식" mode="names" onResult={ns=>{alert(`인식된 이름: ${ns.join(', ')}`);setOcrMode(null);}} onClose={()=>setOcrMode(null)}/>}
          <div className="method-row">
            <button className="method-card photo" onClick={()=>setOcrMode('names')}>
              <span className="mc-icon">📷</span>
              <div><div className="mc-title">사진 촬영</div><div className="mc-sub">OCR 자동 인식</div></div>
            </button>
            <button className="method-card manual" onClick={()=>dispatch({type:'NAV',to:'newgroup'})}>
              <span className="mc-icon">✏️</span>
              <div><div className="mc-title">수동 입력</div><div className="mc-sub">이름 직접 입력</div></div>
            </button>
          </div>
          <div className="card">
            <div className="card-pad" style={{paddingBottom:10}}>
              <div style={{fontSize:11,fontWeight:700,color:'#3a4060',marginBottom:10,letterSpacing:'.5px'}}>참가 선수 ({grp.playerIds.length}명)</div>
              <div>{grp.players.map((p,i)=><span key={p.id} className="p-tag" style={{background:`${grp.color}20`,color:grp.color,border:`1px solid ${grp.color}40`}}>{i+1}.{p.name}</span>)}</div>
            </div>
          </div>
          {grp.games.map(game=>{
            const t1=game.team1.map(id=>pmap[id]||'?').join(' + ');
            const t2=game.team2.map(id=>pmap[id]||'?').join(' + ');
            const byeN=game.bye.map(id=>pmap[id]||'?');
            return(
              <div key={game.id} className="match-card">
                <div className="match-head">
                  <span className="match-no-badge">경기 {game.no}</span>
                  {game.winner?<span className="status-done">✓ 완료</span>:<span className="status-todo">대기</span>}
                </div>
                <div className="match-teams">
                  <div className={`team-box ${game.winner===1?'win':''}`}>{t1}</div>
                  <div className={`vs-score ${!game.winner?'vs-txt':''}`}>{game.winner?`${game.s1}:${game.s2}`:'VS'}</div>
                  <div className={`team-box ${game.winner===2?'win-r':''}`}>{t2}</div>
                </div>
                {byeN.length>0&&<div className="match-bye">💺 쉬는 선수: {byeN.join(', ')}</div>}
              </div>
            );
          })}
          <button className="btn btn-outline btn-block no-print" style={{marginTop:6}} onClick={()=>window.print()}>🖨️ 대진표 인쇄</button>
        </div>
      )}

      {/* ── 경기 결과 ── */}
      {tab==='results'&&(
        <div className="page" style={{paddingTop:12}}>
          {ocrMode==='result'&&<OcrModal title="📷 결과지 사진 인식" mode="result" onResult={t=>{setOcrRef(t);setOcrMode(null);}} onClose={()=>setOcrMode(null)}/>}
          {gameModal&&<GameModal game={gameModal} pmap={pmap} gid={gid} dispatch={dispatch} onClose={()=>setGameModal(null)}/>}
          <div className="method-row">
            <button className="method-card photo" onClick={()=>setOcrMode('result')}>
              <span className="mc-icon">📷</span>
              <div><div className="mc-title">사진 촬영</div><div className="mc-sub">결과지 OCR 참고</div></div>
            </button>
            <div className="method-card manual" style={{cursor:'default'}}>
              <span className="mc-icon">✏️</span>
              <div><div className="mc-title">수동 입력</div><div className="mc-sub">아래 경기 탭하기</div></div>
            </div>
          </div>
          {ocrRef&&(
            <div className="ocr-ref" style={{marginBottom:12}}>
              <div style={{display:'flex',justifyContent:'space-between',marginBottom:6}}>
                <span style={{fontSize:12,fontWeight:700,color:'#f5c842'}}>📋 OCR 참고</span>
                <button style={{fontSize:12,color:'#a0a8d0',background:'none',border:'none',cursor:'pointer'}} onClick={()=>setOcrRef('')}>닫기</button>
              </div>
              <p style={{fontSize:12,color:'#a0a8d0',whiteSpace:'pre-wrap',fontFamily:'monospace'}}>{ocrRef.slice(0,400)}</p>
            </div>
          )}
          <div className="card" style={{marginBottom:10}}>
            <div style={{padding:'14px 18px'}}>
              <div style={{display:'flex',justifyContent:'space-between',fontSize:13,fontWeight:700,marginBottom:8}}>
                <span style={{color:'#a0a8d0'}}>진행률</span>
                <span style={{color:grp.color}}>{done}/{total} 경기</span>
              </div>
              <div className="prog"><div className="prog-fill" style={{width:`${total?done/total*100:0}%`,background:grp.color}}/></div>
            </div>
          </div>
          {grp.games.map(game=>{
            const t1=game.team1.map(id=>pmap[id]||'?').join(' + ');
            const t2=game.team2.map(id=>pmap[id]||'?').join(' + ');
            return(
              <div key={game.id} className={`match-card clickable ${game.winner?'done-card':'todo-card'}`} onClick={()=>setGameModal(game)}>
                <div className="match-head">
                  <span className="match-no-badge">경기 {game.no}</span>
                  {game.winner?<span className="status-done">✓ 탭하여 수정</span>:<span className="status-todo">👆 탭하여 입력</span>}
                </div>
                <div className="match-teams">
                  <div className={`team-box ${game.winner===1?'win':''}`}>{t1}</div>
                  <div className={`vs-score ${!game.winner?'vs-txt':''}`}>{game.winner?`${game.s1}:${game.s2}`:'VS'}</div>
                  <div className={`team-box ${game.winner===2?'win-r':''}`}>{t2}</div>
                </div>
              </div>
            );
          })}
        </div>
      )}

      {/* ── 대시보드 ── */}
      {tab==='dashboard'&&(
        <div className="page" style={{paddingTop:12}}>
          {allDone&&(
            <div className="champ-card">
              <div style={{fontSize:48,marginBottom:8}}>🏆</div>
              <div style={{fontSize:13,color:'#a07020',marginBottom:4}}>최종 우승</div>
              <div className="champ-name">{rank[0]?.player.name}</div>
              <div style={{fontSize:13,color:'#c09040',marginTop:4}}>{rank[0]?.wins}승 · {rank[0]?.pts}점</div>
              <button className="btn" style={{marginTop:14,background:'rgba(245,200,66,.2)',color:'#f5c842',border:'1px solid rgba(245,200,66,.3)',padding:'9px 24px'}}
                onClick={()=>setConfetti(true)}>🎉 축하!</button>
            </div>
          )}

          <div className="card" style={{marginBottom:12}}>
            <div style={{padding:'16px 18px 0',borderLeft:`4px solid ${grp.color}`}}>
              <div style={{fontSize:16,fontWeight:900}}>개인 순위</div>
              <div style={{fontSize:11,color:'#3a4060',marginTop:2,marginBottom:14}}>점수 높은순 내림차순 · 동점시 패 적은순</div>
            </div>
            <table className="rank-table">
              <thead><tr>
                <th style={{textAlign:'center'}}>순위</th>
                <th>이름</th>
                <th>경기</th><th>승</th><th>패</th>
                <th style={{color:'#f5c842'}}>점수</th>
              </tr></thead>
              <tbody>
                {rank.map((r,i)=>(
                  <tr key={r.player.id} className={i===0?'rank-1':i===1?'rank-2':i===2?'rank-3':''}>
                    <td style={{fontSize:20}}>{['🥇','🥈','🥉'][i]||i+1}</td>
                    <td>{r.player.name}</td>
                    <td style={{color:'#3a4060'}}>{r.played}</td>
                    <td className="win-cell">{r.wins}</td>
                    <td className="loss-cell">{r.losses}</td>
                    <td className="pts-cell">{r.pts}</td>
                  </tr>
                ))}
              </tbody>
            </table>
          </div>

          <div className="card">
            <div style={{padding:'16px 18px 4px'}}>
              <div style={{fontSize:14,fontWeight:900,marginBottom:4}}>경기 결과 종합</div>
            </div>
            <div style={{padding:'0 18px 8px'}}>
              {grp.games.map(game=>{
                const t1=game.team1.map(id=>pmap[id]||'?').join('+');
                const t2=game.team2.map(id=>pmap[id]||'?').join('+');
                return(
                  <div key={game.id} className="result-row">
                    <span className="r-no">경기{game.no}</span>
                    <span className={`r-t1 ${game.winner===1?'w':''}`}>{t1}</span>
                    <span className="r-score">{game.winner?`${game.s1}:${game.s2}`:'-:-'}</span>
                    <span className={`r-t2 ${game.winner===2?'w':''}`}>{t2}</span>
                  </div>
                );
              })}
            </div>
          </div>
          <button className="btn btn-outline btn-block no-print" style={{marginTop:8}} onClick={()=>window.print()}>🖨️ 결과표 인쇄</button>
        </div>
      )}
    </div>
  );
}

/* ════════════════════
   앱
════════════════════ */
function App(){
  const [st,dispatch]=useReducer(reducer,null,load);
  const [showSettings,setShowSettings]=useState(false);
  useEffect(()=>{try{localStorage.setItem('bdm_v9',JSON.stringify(st));}catch{}},[st]);
  const pending=st.groups.reduce((a,g)=>a+g.games.filter(gm=>!gm.winner).length,0);
  return(
    <div style={{minHeight:'100vh',background:'var(--bg)'}}>
      {/* 헤더 */}
      <div className="app-header no-print">
        <div className="header-logo">
          🏸 <span>배드민턴 조 리그</span>
        </div>
        <div className="header-actions">
          {pending>0&&<span className="badge-pill">대기 {pending}</span>}
          <button className="icon-btn" onClick={()=>dispatch({type:'NAV',to:'home'})}>🏠</button>
          <button className="icon-btn" onClick={()=>setShowSettings(true)}>⚙️</button>
        </div>
      </div>

      {st.nav==='group'    &&<GroupScreen    st={st} dispatch={dispatch}/>}
      {st.nav==='newgroup' &&<NewGroupScreen  st={st} dispatch={dispatch}/>}
      {st.nav==='home'     &&<HomeScreen      st={st} dispatch={dispatch}/>}

      {showSettings&&<SettingsPanel st={st} dispatch={dispatch} onClose={()=>setShowSettings(false)}/>}
    </div>
  );
}
ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
</body>
</html>
