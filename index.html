<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width,initial-scale=1.0,maximum-scale=1.0,user-scalable=no"/>
  <title>🏸 배드민턴 조 리그</title>
  <style>
    *{box-sizing:border-box;-webkit-tap-highlight-color:transparent;margin:0;padding:0;}
    body{font-family:-apple-system,BlinkMacSystemFont,'Noto Sans KR',sans-serif;background:#f1f5f9;min-height:100vh;}
    button{cursor:pointer;border:none;background:none;font-family:inherit;}

    /* 레이아웃 */
    .page{max-width:480px;margin:0 auto;padding:12px 12px calc(16px + env(safe-area-inset-bottom));}
    .header{position:sticky;top:0;z-index:100;background:#fff;border-bottom:1px solid #e2e8f0;padding:12px 16px;display:flex;align-items:center;justify-content:space-between;}
    .header-title{font-size:16px;font-weight:900;color:#1e293b;}
    .badge-red{background:#ef4444;color:#fff;font-size:11px;font-weight:700;padding:2px 8px;border-radius:99px;}

    /* 카드 */
    .card{background:#fff;border-radius:16px;box-shadow:0 1px 4px rgba(0,0,0,.08);margin-bottom:12px;overflow:hidden;}
    .card-body{padding:14px 16px;}

    /* 버튼 공통 */
    .btn{display:inline-flex;align-items:center;justify-content:center;gap:6px;font-family:inherit;font-weight:700;border-radius:12px;cursor:pointer;transition:opacity .15s,transform .1s;border:none;}
    .btn:active{opacity:.8;transform:scale(.97);}
    .btn-primary{background:#6366f1;color:#fff;padding:12px 20px;font-size:15px;}
    .btn-green{background:#22c55e;color:#fff;padding:14px;font-size:17px;width:100%;border-radius:14px;}
    .btn-ghost{background:#f1f5f9;color:#475569;padding:10px 16px;font-size:13px;}
    .btn-danger{background:#fee2e2;color:#dc2626;padding:10px 16px;font-size:13px;}
    .btn-outline{background:#fff;border:2px solid #e2e8f0;color:#475569;padding:10px 16px;font-size:13px;}
    .btn-block{width:100%;padding:14px;font-size:16px;border-radius:14px;}
    .btn-sm{padding:7px 14px;font-size:12px;border-radius:10px;}

    /* 조 탭 */
    .grp-tabs{display:flex;gap:8px;overflow-x:auto;padding:10px 12px;scrollbar-width:none;}
    .grp-tabs::-webkit-scrollbar{display:none;}
    .grp-tab{flex-shrink:0;padding:8px 16px;border-radius:20px;font-size:13px;font-weight:700;border:2px solid #e2e8f0;background:#fff;color:#64748b;white-space:nowrap;}
    .grp-tab.active{color:#fff;border-color:transparent;}

    /* 3개 액션 버튼 */
    .action-grid{display:grid;grid-template-columns:repeat(3,1fr);border-top:1px solid #f1f5f9;}
    .action-btn{display:flex;flex-direction:column;align-items:center;padding:14px 8px;gap:5px;background:#fff;border:none;cursor:pointer;font-family:inherit;}
    .action-btn:active{background:#f8fafc;}
    .action-btn .icon{font-size:26px;line-height:1;}
    .action-btn .label{font-size:12px;font-weight:700;color:#475569;}

    /* 입력방법 2버튼 */
    .method-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:14px;}
    .method-btn{display:flex;align-items:center;gap:10px;padding:14px;border-radius:14px;border:2px solid;cursor:pointer;background:none;font-family:inherit;text-align:left;}
    .method-btn.photo{border-color:#fbbf24;background:#fffbeb;}
    .method-btn.manual{border-color:#a5b4fc;background:#eef2ff;}
    .method-btn .m-icon{font-size:26px;flex-shrink:0;}
    .method-btn .m-title{font-size:13px;font-weight:700;}
    .method-btn .m-sub{font-size:11px;margin-top:2px;}
    .method-btn.photo .m-title{color:#92400e;}
    .method-btn.photo .m-sub{color:#b45309;}
    .method-btn.manual .m-title{color:#3730a3;}
    .method-btn.manual .m-sub{color:#6366f1;}

    /* 테이블 */
    table{width:100%;border-collapse:collapse;font-size:13px;}
    thead td,thead th{background:#f8fafc;color:#94a3b8;font-size:11px;font-weight:700;padding:8px 12px;text-align:center;}
    thead th:nth-child(2){text-align:left;}
    tbody tr{border-top:1px solid #f1f5f9;}
    tbody td{padding:11px 12px;text-align:center;}
    tbody td:nth-child(2){text-align:left;font-weight:700;color:#1e293b;}
    .rank-gold{background:#fefce8;}
    .rank-silver{background:#f8fafc;}
    .rank-bronze{background:#fff7ed;}

    /* 경기 카드 */
    .match-card{background:#fff;border-radius:14px;padding:14px;margin-bottom:10px;box-shadow:0 1px 3px rgba(0,0,0,.07);}
    .match-header{display:flex;justify-content:space-between;align-items:center;margin-bottom:10px;}
    .match-no{font-size:11px;font-weight:700;background:#f1f5f9;color:#64748b;padding:3px 8px;border-radius:20px;}
    .match-status-done{font-size:11px;font-weight:700;background:#dcfce7;color:#16a34a;padding:3px 8px;border-radius:20px;}
    .match-status-todo{font-size:11px;font-weight:700;background:#ffedd5;color:#ea580c;padding:3px 8px;border-radius:20px;}
    .match-row{display:flex;align-items:center;gap:8px;}
    .match-team{flex:1;padding:10px 8px;border-radius:10px;font-size:13px;font-weight:700;text-align:center;background:#f8fafc;color:#334155;}
    .match-team.win-left{background:#eef2ff;color:#4338ca;}
    .match-team.win-right{background:#fff1f2;color:#be123c;}
    .match-score{min-width:48px;text-align:center;font-size:17px;font-weight:900;color:#1e293b;}
    .match-score.vs{font-size:12px;color:#cbd5e1;font-weight:700;}
    .match-bye{font-size:11px;color:#94a3b8;text-align:center;margin-top:8px;}
    .match-card.done{border-left:4px solid #22c55e;}
    .match-card.todo{border-left:4px solid #fb923c;cursor:pointer;}
    .match-card.todo:active{transform:scale(.98);}

    /* 진행바 */
    .prog-wrap{background:#f1f5f9;border-radius:99px;height:8px;overflow:hidden;margin-top:6px;}
    .prog-bar{height:100%;border-radius:99px;transition:width .5s;}

    /* 모달 */
    .modal-bg{position:fixed;inset:0;background:rgba(0,0,0,.5);z-index:200;display:flex;align-items:flex-end;justify-content:center;}
    .modal-box{background:#fff;border-radius:24px 24px 0 0;width:100%;max-width:480px;padding:20px 20px calc(28px + env(safe-area-inset-bottom));max-height:88vh;overflow-y:auto;animation:slideUp .2s ease-out;}
    @keyframes slideUp{from{transform:translateY(40px);opacity:0}to{transform:translateY(0);opacity:1}}
    .modal-title{font-size:17px;font-weight:900;color:#1e293b;margin-bottom:4px;}
    .modal-close{font-size:26px;color:#cbd5e1;line-height:1;background:none;border:none;cursor:pointer;}

    /* 승팀 선택 */
    .winner-grid{display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-bottom:16px;}
    .winner-btn{padding:16px 10px;border-radius:14px;border:2px solid #e2e8f0;text-align:center;cursor:pointer;background:#fff;font-family:inherit;}
    .winner-btn.sel-left{border-color:#6366f1;background:#eef2ff;}
    .winner-btn.sel-right{border-color:#f43f5e;background:#fff1f2;}
    .winner-btn .team-label{font-size:11px;color:#94a3b8;margin-bottom:4px;}
    .winner-btn .team-name{font-size:13px;font-weight:700;color:#334155;}
    .winner-btn.sel-left .team-name{color:#4338ca;}
    .winner-btn.sel-right .team-name{color:#be123c;}
    .winner-btn .win-badge{font-size:11px;margin-top:6px;}

    /* 점수입력 */
    .score-row{display:flex;align-items:flex-end;gap:12px;margin-bottom:18px;}
    .score-input-wrap{flex:1;text-align:center;}
    .score-label{font-size:11px;color:#94a3b8;margin-bottom:4px;}
    .score-input{width:100%;border:2px solid #e2e8f0;border-radius:12px;padding:12px;text-align:center;font-size:30px;font-weight:900;outline:none;font-family:inherit;color:#1e293b;}
    .score-input:focus{border-color:#6366f1;}
    .score-sep{font-size:22px;font-weight:900;color:#e2e8f0;padding-bottom:14px;}

    /* 선수 태그 */
    .player-tags{display:flex;flex-wrap:wrap;gap:6px;margin-top:8px;}
    .player-tag{padding:5px 12px;border-radius:99px;font-size:12px;font-weight:700;color:#fff;}

    /* OCR 진행 */
    .ocr-prog{height:10px;background:#e2e8f0;border-radius:99px;overflow:hidden;margin-top:8px;}
    .ocr-bar{height:100%;background:#6366f1;border-radius:99px;transition:width .3s;}
    .name-chip{display:inline-block;padding:6px 14px;border-radius:99px;font-size:13px;font-weight:700;border:2px solid;cursor:pointer;margin:4px;}
    .name-chip.on{border-color:#6366f1;background:#eef2ff;color:#4338ca;}
    .name-chip.off{border-color:#e2e8f0;background:#f8fafc;color:#94a3b8;text-decoration:line-through;}

    /* 전체현황 배너 */
    .banner{border-radius:16px;padding:16px;margin-bottom:12px;color:#fff;}
    .banner-sub{font-size:12px;opacity:.8;margin-bottom:2px;}
    .banner-main{font-size:20px;font-weight:900;}

    /* 빠른이동 */
    .quick-btns{display:flex;flex-wrap:wrap;gap:8px;}
    .quick-btn{padding:7px 14px;border-radius:10px;border:2px solid #e2e8f0;background:#f8fafc;font-size:12px;font-weight:700;color:#475569;}

    /* 순위 미리보기 */
    .rank-preview{display:flex;gap:14px;padding:12px 16px;background:#f8fafc;border-top:1px solid #f1f5f9;}
    .rank-item{display:flex;align-items:center;gap:6px;}
    .rank-item .rname{font-size:12px;font-weight:800;color:#1e293b;}
    .rank-item .rpts{font-size:11px;color:#94a3b8;}

    /* 우승 배너 */
    .champ-banner{background:linear-gradient(135deg,#f59e0b,#ef4444);border-radius:16px;padding:20px;text-align:center;color:#fff;margin-bottom:12px;}
    .champ-name{font-size:24px;font-weight:900;margin:4px 0;}

    /* 결과 종합 행 */
    .result-row{display:flex;align-items:center;padding:10px 16px;border-bottom:1px solid #f1f5f9;}
    .result-row:last-child{border-bottom:none;}
    .result-no{font-size:11px;color:#cbd5e1;width:36px;flex-shrink:0;}
    .result-t1,.result-t2{flex:1;font-size:12px;font-weight:700;}
    .result-t1{text-align:right;}
    .result-t2{text-align:left;}
    .result-t1.winner{color:#4338ca;}
    .result-t2.winner{color:#be123c;}
    .result-score{min-width:52px;text-align:center;font-size:14px;font-weight:900;color:#1e293b;padding:0 6px;}

    /* 입력폼 */
    .form-input{width:100%;border:2px solid #e2e8f0;border-radius:12px;padding:12px 16px;font-size:15px;font-family:inherit;outline:none;color:#1e293b;}
    .form-input:focus{border-color:#6366f1;}
    .form-label{font-size:12px;font-weight:700;color:#64748b;margin-bottom:6px;display:block;}

    /* 선수 목록 */
    .player-row{display:flex;align-items:center;gap:8px;padding:10px 0;border-bottom:1px solid #f8fafc;}
    .player-row:last-child{border-bottom:none;}
    .player-num{font-size:12px;color:#cbd5e1;width:20px;text-align:center;}
    .player-name{flex:1;font-size:14px;font-weight:600;color:#1e293b;}
    .btn-icon{background:none;border:none;cursor:pointer;font-size:16px;padding:4px 6px;color:#cbd5e1;}
    .btn-icon:hover{color:#94a3b8;}

    /* 정보 박스 */
    .info-box{background:#eef2ff;border-radius:10px;padding:10px 14px;font-size:13px;font-weight:700;color:#4338ca;margin-bottom:12px;}
    .warn-box{background:#fff7ed;border-radius:10px;padding:10px 14px;font-size:13px;color:#c2410c;margin-bottom:12px;}
    .ocr-ref-box{background:#fffbeb;border:1px solid #fcd34d;border-radius:12px;padding:12px;margin-bottom:12px;}

    /* 확인 다이얼로그 */
    .dialog-bg{position:fixed;inset:0;background:rgba(0,0,0,.5);z-index:300;display:flex;align-items:center;justify-content:center;padding:20px;}
    .dialog{background:#fff;border-radius:20px;padding:24px;width:100%;max-width:320px;text-align:center;}
    .dialog h3{font-size:16px;font-weight:900;color:#1e293b;margin-bottom:6px;}
    .dialog p{font-size:13px;color:#64748b;margin-bottom:18px;}
    .dialog-btns{display:grid;grid-template-columns:1fr 1fr;gap:8px;}

    /* 콘페티 */
    .conf-box{position:fixed;inset:0;pointer-events:none;z-index:999;overflow:hidden;}
    .conf-p{position:absolute;border-radius:2px;}
    @keyframes fall{0%{transform:translateY(-10px) rotate(0);opacity:1}100%{transform:translateY(110vh) rotate(720deg);opacity:0}}

    /* 탭바 */
    .tab-bar{position:sticky;top:53px;z-index:90;background:#fff;border-bottom:1px solid #e2e8f0;display:flex;}
    .tab-btn{flex:1;display:flex;flex-direction:column;align-items:center;padding:10px 4px;gap:2px;font-size:12px;font-weight:700;color:#94a3b8;border-bottom:2px solid transparent;background:none;font-family:inherit;}
    .tab-btn.active{color:#6366f1;border-bottom-color:#6366f1;}
    .tab-btn .t-icon{font-size:18px;}

    @media print{.no-print{display:none!important;}body{background:#fff;}}
  </style>
</head>
<body>
<div id="root"></div>
<script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
<script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
<script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
<script src="https://unpkg.com/tesseract.js@5/dist/tesseract.min.js"></script>
<script type="text/babel">
const {useState,useEffect,useReducer,useRef} = React;

/* ── 상수 ── */
const MAX = 10;
const COLORS = ['#6366f1','#8b5cf6','#ec4899','#f43f5e','#f97316','#eab308','#10b981','#0ea5e9','#14b8a6','#84cc16'];
const uid = () => Math.random().toString(36).slice(2,9);

/* ── 대진표 생성 ── */
function genSchedule(ids) {
  const p=ids, n=p.length;
  if(n===4) return [
    {team1:[p[0],p[1]],team2:[p[2],p[3]],bye:[]},
    {team1:[p[0],p[2]],team2:[p[1],p[3]],bye:[]},
    {team1:[p[0],p[3]],team2:[p[1],p[2]],bye:[]},
  ];
  if(n===5) return [
    {team1:[p[0],p[1]],team2:[p[2],p[3]],bye:[p[4]]},
    {team1:[p[0],p[2]],team2:[p[3],p[4]],bye:[p[1]]},
    {team1:[p[0],p[3]],team2:[p[1],p[4]],bye:[p[2]]},
    {team1:[p[0],p[4]],team2:[p[1],p[2]],bye:[p[3]]},
    {team1:[p[1],p[3]],team2:[p[2],p[4]],bye:[p[0]]},
  ];
  if(n===6) return [
    {team1:[p[0],p[1],p[2]],team2:[p[3],p[4],p[5]],bye:[]},
    {team1:[p[0],p[3],p[4]],team2:[p[1],p[2],p[5]],bye:[]},
    {team1:[p[0],p[1],p[5]],team2:[p[2],p[3],p[4]],bye:[]},
    {team1:[p[0],p[2],p[4]],team2:[p[1],p[3],p[5]],bye:[]},
    {team1:[p[0],p[2],p[3]],team2:[p[1],p[4],p[5]],bye:[]},
  ];
  return [];
}

/* ── 개인순위 (점수 내림차순) ── */
function calcRank(players, games) {
  const s={};
  players.forEach(p=>{s[p.id]={player:p,wins:0,losses:0,played:0,pts:0};});
  games.filter(g=>g.winner).forEach(g=>{
    (g.winner===1?g.team1:g.team2).forEach(id=>{if(s[id]){s[id].wins++;s[id].pts+=2;s[id].played++;}});
    (g.winner===1?g.team2:g.team1).forEach(id=>{if(s[id]){s[id].losses++;s[id].played++;}});
  });
  return Object.values(s).sort((a,b)=>b.pts-a.pts||a.losses-b.losses||b.wins-a.wins);
}

/* ── OCR ── */
async function doOCR(file,onProg){
  const r=await Tesseract.recognize(file,'kor+eng',{logger:m=>{if(m.status==='recognizing text')onProg(Math.round(m.progress*100));}});
  return r.data.text;
}
function extractNames(text){
  return [...new Set(text.split(/[\s\n,|\-\/\\0-9\.()]+/).map(t=>t.trim()).filter(t=>/^[가-힣]{2,4}$/.test(t)))];
}

/* ── 상태 ── */
const INIT={groups:[],nav:'home',navData:null};
function load(){try{const s=localStorage.getItem('bdm_v8');return s?JSON.parse(s):INIT;}catch{return INIT;}}
function reducer(st,ac){
  switch(ac.type){
    case 'NAV':return{...st,nav:ac.to,navData:ac.data||null};
    case 'SET_TAB':return{...st,navData:{...st.navData,tab:ac.tab}};
    case 'ADD_GROUP':{
      if(st.groups.length>=MAX)return st;
      const games=genSchedule(ac.playerIds).map((g,i)=>({id:uid(),no:i+1,...g,winner:null,s1:null,s2:null}));
      const grp={id:uid(),name:ac.name,playerIds:ac.playerIds,players:ac.players,color:COLORS[st.groups.length%COLORS.length],games};
      return{...st,groups:[...st.groups,grp],nav:'group',navData:{gid:grp.id,tab:'bracket'}};
    }
    case 'DEL_GROUP':return{...st,groups:st.groups.filter(g=>g.id!==ac.id),nav:'home',navData:null};
    case 'RECORD':{
      const groups=st.groups.map(g=>{
        if(g.id!==ac.gid)return g;
        return{...g,games:g.games.map(gm=>gm.id===ac.gameId?{...gm,winner:ac.winner,s1:ac.s1,s2:ac.s2}:gm)};
      });
      return{...st,groups};
    }
    case 'RESET':return INIT;
    default:return st;
  }
}

/* ── 콘페티 ── */
function Confetti({on}){
  if(!on)return null;
  const C=['#f6d365','#fda085','#84fab0','#8fd3f4','#a18cd1','#fbc2eb'];
  return(
    <div className="conf-box">
      {Array.from({length:70},(_,i)=>(
        <div key={i} className="conf-p" style={{
          left:`${Math.random()*100}%`,width:7+Math.random()*9,height:7+Math.random()*9,
          backgroundColor:C[i%C.length],borderRadius:Math.random()>.5?'50%':'2px',
          animation:`fall ${2+Math.random()*2}s ${Math.random()*2.5}s linear forwards`
        }}/>
      ))}
    </div>
  );
}

/* ── OCR 모달 ── */
function OcrModal({title,mode,onResult,onClose}){
  const [stage,setStage]=useState('idle');
  const [prog,setProg]=useState(0);
  const [raw,setRaw]=useState('');
  const [names,setNames]=useState([]);
  const ref=useRef();
  const handle=async e=>{
    const f=e.target.files?.[0];if(!f)return;
    setStage('ocring');setProg(0);
    try{const text=await doOCR(f,setProg);setRaw(text);if(mode==='names')setNames(extractNames(text));setStage('done');}
    catch{setStage('err');}
  };
  const toggle=n=>setNames(p=>p.includes(n)?p.filter(x=>x!==n):[...p,n]);
  return(
    <div className="modal-bg" onClick={onClose}>
      <div className="modal-box" onClick={e=>e.stopPropagation()}>
        <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:16}}>
          <span className="modal-title">{title}</span>
          <button className="modal-close" onClick={onClose}>×</button>
        </div>
        {stage==='idle'&&(
          <div style={{textAlign:'center',padding:'24px 0'}}>
            <div style={{fontSize:48,marginBottom:12}}>📸</div>
            <p style={{color:'#64748b',fontSize:14,marginBottom:20,lineHeight:1.6}}>
              {mode==='names'?'선수 이름이 적힌 대진표를 촬영하세요':'수기 결과지를 촬영하세요 (참고용)'}
            </p>
            <button className="btn btn-primary" onClick={()=>ref.current.click()}>📷 사진 촬영 / 갤러리</button>
            <input ref={ref} type="file" accept="image/*" capture="environment" style={{display:'none'}} onChange={handle}/>
          </div>
        )}
        {stage==='ocring'&&(
          <div style={{textAlign:'center',padding:'32px 0'}}>
            <div style={{fontSize:44,marginBottom:12}}>🔍</div>
            <p style={{fontWeight:700,color:'#475569',marginBottom:12}}>인식 중... {prog}%</p>
            <div className="ocr-prog"><div className="ocr-bar" style={{width:`${prog}%`}}/></div>
          </div>
        )}
        {stage==='err'&&(
          <div style={{textAlign:'center',padding:'24px 0'}}>
            <div style={{fontSize:40,marginBottom:8}}>❌</div>
            <p style={{color:'#94a3b8',marginBottom:12}}>인식 실패</p>
            <button className="btn btn-ghost" onClick={()=>setStage('idle')}>다시 시도</button>
          </div>
        )}
        {stage==='done'&&mode==='names'&&(
          <div>
            <p style={{fontSize:13,color:'#64748b',marginBottom:10}}>인식된 이름 탭하여 선택 ({names.length}명)</p>
            {names.length===0&&<p style={{color:'#f97316',fontSize:13,marginBottom:8}}>이름을 찾지 못했습니다. 아래 원문을 수정하세요.</p>}
            <div style={{marginBottom:10}}>
              {names.map(n=>(
                <button key={n} className={`name-chip ${names.includes(n)?'on':'off'}`} onClick={()=>toggle(n)}>{n}</button>
              ))}
            </div>
            <textarea value={raw} onChange={e=>{setRaw(e.target.value);setNames(extractNames(e.target.value));}}
              style={{width:'100%',height:80,fontSize:12,border:'1px solid #e2e8f0',borderRadius:10,padding:8,resize:'none',fontFamily:'monospace',marginBottom:12,outline:'none'}}/>
            <button className="btn btn-primary btn-block" disabled={names.length<2}
              style={{opacity:names.length<2?.4:1}}
              onClick={()=>onResult(names)}>
              {names.length}명 추가하기
            </button>
          </div>
        )}
        {stage==='done'&&mode==='result'&&(
          <div>
            <div className="ocr-ref-box">
              <p style={{fontSize:12,fontWeight:700,color:'#92400e',marginBottom:6}}>📋 인식 결과 (참고용)</p>
              <p style={{fontSize:12,color:'#78350f',whiteSpace:'pre-wrap',fontFamily:'monospace',lineHeight:1.5}}>{raw.slice(0,500)}</p>
            </div>
            <button className="btn btn-primary btn-block" onClick={()=>onResult(raw)}>확인 — 직접 입력하기</button>
          </div>
        )}
      </div>
    </div>
  );
}

/* ── 경기 결과 입력 모달 ── */
function GameModal({game,pmap,gid,dispatch,onClose}){
  const [winner,setWinner]=useState(game.winner||null);
  const [s1,setS1]=useState(game.s1!=null?String(game.s1):'');
  const [s2,setS2]=useState(game.s2!=null?String(game.s2):'');
  const t1=game.team1.map(id=>pmap[id]||'?').join(' + ');
  const t2=game.team2.map(id=>pmap[id]||'?').join(' + ');
  const save=()=>{if(!winner)return;dispatch({type:'RECORD',gid,gameId:game.id,winner,s1:parseInt(s1)||0,s2:parseInt(s2)||0});onClose();};
  return(
    <div className="modal-bg" onClick={onClose}>
      <div className="modal-box" onClick={e=>e.stopPropagation()}>
        <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:16}}>
          <span className="modal-title">경기 {game.no} 결과 입력</span>
          <button className="modal-close" onClick={onClose}>×</button>
        </div>
        <p style={{textAlign:'center',fontSize:12,color:'#94a3b8',marginBottom:12}}>승리팀을 선택하세요</p>
        <div className="winner-grid">
          <button className={`winner-btn ${winner===1?'sel-left':''}`} onClick={()=>setWinner(1)}>
            <div className="team-label">팀 1</div>
            <div className="team-name">{t1}</div>
            {winner===1&&<div className="win-badge">🏆 승리</div>}
          </button>
          <button className={`winner-btn ${winner===2?'sel-right':''}`} onClick={()=>setWinner(2)}>
            <div className="team-label">팀 2</div>
            <div className="team-name">{t2}</div>
            {winner===2&&<div className="win-badge">🏆 승리</div>}
          </button>
        </div>
        <div className="score-row">
          <div className="score-input-wrap">
            <div className="score-label">팀1 점수</div>
            <input className="score-input" type="number" inputMode="numeric" value={s1} onChange={e=>setS1(e.target.value)} placeholder="0"/>
          </div>
          <div className="score-sep">:</div>
          <div className="score-input-wrap">
            <div className="score-label">팀2 점수</div>
            <input className="score-input" type="number" inputMode="numeric" value={s2} onChange={e=>setS2(e.target.value)} placeholder="0"/>
          </div>
        </div>
        <button className="btn btn-primary btn-block" disabled={!winner} style={{opacity:!winner?.4:1}} onClick={save}>저장</button>
      </div>
    </div>
  );
}

function NewGroupScreen({st,dispatch}){
  const [players,setPlayers]=useState([]);
  const [input,setInput]=useState('');
  const [grpName,setGrpName]=useState('');
  const [showOcr,setShowOcr]=useState(false);
  const nextNum=st.groups.length+1;
  const n=players.length;
  const add=()=>{const nm=input.trim();if(!nm||n>=6)return;setPlayers(p=>[...p,{id:uid(),name:nm}]);setInput('');};
  const remove=id=>setPlayers(p=>p.filter(x=>x.id!==id));
  const addBulk=names=>{setPlayers(p=>[...p,...names.slice(0,6-p.length).map(nm=>({id:uid(),name:nm}))]);setShowOcr(false);};
  const info=n===4?'3경기, 각자 3게임':n===5?'5경기, 각자 4게임':n===6?'5경기, 각자 5게임(3v3)':'';
  const create=()=>{if(n<4)return;dispatch({type:'ADD_GROUP',name:grpName.trim()||`${nextNum}조`,players,playerIds:players.map(p=>p.id)});};
  if(st.groups.length>=MAX) return(
    <div className="page" style={{textAlign:'center',paddingTop:40}}>
      <div style={{fontSize:44,marginBottom:12}}>⚠️</div>
      <p style={{fontWeight:700,color:'#dc2626',fontSize:16,marginBottom:20}}>최대 10개 조까지 가능합니다</p>
      <button className="btn btn-ghost" onClick={()=>dispatch({type:'NAV',to:'home'})}>← 홈으로</button>
    </div>
  );
  return(
    <div className="page">
      {showOcr&&<OcrModal title="📷 사진으로 선수 추가" mode="names" onResult={addBulk} onClose={()=>setShowOcr(false)}/>}
      <div style={{display:'flex',alignItems:'center',gap:10,marginBottom:16}}>
        <button className="btn btn-ghost btn-sm" onClick={()=>dispatch({type:'NAV',to:'home'})}>← 홈</button>
        <span style={{fontSize:17,fontWeight:900,color:'#1e293b'}}>{nextNum}조 만들기</span>
        <span style={{fontSize:12,color:'#94a3b8',marginLeft:'auto'}}>{st.groups.length}/{MAX}</span>
      </div>

      <div className="card">
        <div className="card-body">
          <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:12}}>
            <span style={{fontWeight:700,color:'#1e293b'}}>참가 선수 <span style={{color:'#6366f1'}}>{n}</span><span style={{color:'#cbd5e1'}}>/6</span></span>
            <button className="btn btn-sm" style={{background:'#fffbeb',color:'#92400e',border:'1px solid #fcd34d'}}
              disabled={n>=6} onClick={()=>setShowOcr(true)}>📷 사진으로 추가</button>
          </div>
          {n>=4&&<div className="info-box">{n}명 → {info}</div>}
          {players.map((p,i)=>(
            <div key={p.id} className="player-row">
              <span className="player-num">{i+1}</span>
              <span className="player-name">{p.name}</span>
              <button className="btn-icon" onClick={()=>remove(p.id)}>✕</button>
            </div>
          ))}
          {n<6&&(
            <div style={{display:'flex',gap:8,marginTop:12}}>
              <input className="form-input" style={{flex:1,padding:'10px 14px'}}
                placeholder="✏️ 이름 직접 입력 (수동)"
                value={input} onChange={e=>setInput(e.target.value)}
                onKeyDown={e=>e.key==='Enter'&&add()}/>
              <button className="btn btn-primary" onClick={add}>추가</button>
            </div>
          )}
        </div>
      </div>

      {n>=4&&(
        <div className="card">
          <div className="card-body">
            <label className="form-label">조 이름</label>
            <input className="form-input" style={{marginBottom:12}} placeholder={`${nextNum}조`}
              value={grpName} onChange={e=>setGrpName(e.target.value)}/>
            <button className="btn btn-green" onClick={create}>
              🏸 {grpName||nextNum+'조'} 생성!
            </button>
          </div>
        </div>
      )}
      {n<4&&(
        <div className="warn-box">최소 4명 필요 (현재 {n}명, {4-n}명 더 추가하세요)</div>
      )}
    </div>
  );
}

                <button style={{fontSize:12,color:'#b45309',background:'none',border:'none',cursor:'pointer'}} onClick={()=>setOcrRef('')}>닫기</button>
              </div>
              <p style={{fontSize:12,color:'#78350f',whiteSpace:'pre-wrap',fontFamily:'monospace'}}>{ocrRef.slice(0,400)}</p>
            </div>
          )}
          <div className="card" style={{marginBottom:10}}>
            <div className="card-body" style={{paddingBottom:10}}>
              <div style={{display:'flex',justifyContent:'space-between',fontSize:13,fontWeight:700,marginBottom:8}}>
                <span style={{color:'#475569'}}>진행률</span>
                <span style={{color:grp.color}}>{done}/{total}</span>
              </div>
              <div className="prog-wrap"><div className="prog-bar" style={{width:`${total?done/total*100:0}%`,background:grp.color}}/></div>
            </div>
          </div>
          {grp.games.map(game=>{
            const t1=game.team1.map(id=>pmap[id]||'?').join(' + ');
            const t2=game.team2.map(id=>pmap[id]||'?').join(' + ');
            return(
              <div key={game.id} className={`match-card ${game.winner?'done':'todo'}`} onClick={()=>setGameModal(game)}>
                <div className="match-header">
                  <span className="match-no">경기 {game.no}</span>
                  {game.winner?<span className="match-status-done">✓ 탭하여 수정</span>:<span className="match-status-todo">👆 탭하여 입력</span>}
                </div>
                <div className="match-row">
                  <div className={`match-team ${game.winner===1?'win-left':''}`}>{t1}</div>
                  <div className={`match-score ${!game.winner?'vs':''}`}>{game.winner?`${game.s1}:${game.s2}`:'VS'}</div>
                  <div className={`match-team ${game.winner===2?'win-right':''}`}>{t2}</div>
                </div>
              </div>
            );
          })}
        </div>
      )}

      {/* ── 대시보드 ── */}
      {tab==='dashboard'&&(
        <div className="page" style={{paddingTop:0}}>
          {allDone&&(
            <div className="champ-banner">
              <div style={{fontSize:40,marginBottom:4}}>🏆</div>
              <div style={{fontSize:13,opacity:.8,marginBottom:4}}>최종 우승</div>
              <div className="champ-name">{rank[0]?.player.name}</div>
              <div style={{fontSize:13,opacity:.8}}>{rank[0]?.wins}승 · {rank[0]?.pts}점</div>
              <button className="btn" style={{marginTop:10,background:'rgba(255,255,255,.25)',color:'#fff',padding:'8px 20px'}} onClick={()=>setConfetti(true)}>🎉 축하!</button>
            </div>
          )}
          {/* 개인순위 */}
          <div className="card" style={{marginBottom:10}}>
            <div className="card-body" style={{paddingBottom:0,borderLeft:`4px solid ${grp.color}`}}>
              <div style={{fontWeight:900,fontSize:15,color:'#1e293b'}}>개인 순위</div>
              <div style={{fontSize:12,color:'#94a3b8',marginTop:2,marginBottom:12}}>점수 높은순 내림차순 · 동점시 패 적은순</div>
            </div>
            <table>
              <thead><tr>
                <td style={{textAlign:'center'}}>순위</td>
                <th>이름</th>
                <th>경기</th><th>승</th><th>패</th>
                <th style={{color:'#6366f1'}}>점수</th>
              </tr></thead>
              <tbody>
                {rank.map((r,i)=>(
                  <tr key={r.player.id} className={i===0?'rank-gold':i===1?'rank-silver':i===2?'rank-bronze':''}>
                    <td style={{fontSize:18}}>{['🥇','🥈','🥉'][i]||i+1}</td>
                    <td>{r.player.name}</td>
                    <td style={{color:'#94a3b8'}}>{r.played}</td>
                    <td style={{color:'#6366f1',fontWeight:700}}>{r.wins}</td>
                    <td style={{color:'#f43f5e'}}>{r.losses}</td>
                    <td style={{color:'#6366f1',fontWeight:900,fontSize:15}}>{r.pts}</td>
                  </tr>
                ))}
              </tbody>
            </table>
          </div>
          {/* 경기결과 종합 */}
          <div className="card">
            <div className="card-body" style={{paddingBottom:0}}>
              <div style={{fontWeight:700,fontSize:14,color:'#1e293b',marginBottom:4}}>경기 결과 종합</div>
            </div>
            {grp.games.map(game=>{
              const t1=game.team1.map(id=>pmap[id]||'?').join('+');
              const t2=game.team2.map(id=>pmap[id]||'?').join('+');
              return(
                <div key={game.id} className="result-row">
                  <span className="result-no">경기{game.no}</span>
                  <span className={`result-t1 ${game.winner===1?'winner':''}`}>{t1}</span>
                  <span className="result-score">{game.winner?`${game.s1}:${game.s2}`:'-:-'}</span>
                  <span className={`result-t2 ${game.winner===2?'winner':''}`}>{t2}</span>
                </div>
              );
            })}
          </div>
          <button className="btn btn-outline btn-block no-print" style={{marginTop:8}} onClick={()=>window.print()}>🖨️ 결과표 인쇄</button>
        </div>
      )}
    </div>
  );
}

/* ════════════════════════════
   앱
════════════════════════════ */
function App(){
  const [st,dispatch]=useReducer(reducer,null,load);
  useEffect(()=>{try{localStorage.setItem('bdm_v8',JSON.stringify(st));}catch{}},[st]);
  const pending=st.groups.reduce((a,g)=>a+g.games.filter(gm=>!gm.winner).length,0);
  return(
    <div style={{minHeight:'100vh',background:'#f1f5f9'}}>
      <div className="header no-print">
        <button className="header-title" onClick={()=>dispatch({type:'NAV',to:'home'})}>🏸 배드민턴 조 리그</button>
        <div style={{display:'flex',alignItems:'center',gap:8}}>
          {pending>0&&<span className="badge-red">대기 {pending}</span>}
          <span style={{fontSize:11,color:'#cbd5e1'}}>v6</span>
        </div>
      </div>
      {st.nav==='group'    && <GroupScreen   st={st} dispatch={dispatch}/>}
      {st.nav==='newgroup' && <NewGroupScreen st={st} dispatch={dispatch}/>}
      {st.nav==='home'     && <HomeScreen     st={st} dispatch={dispatch}/>}
    </div>
  );
}
ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
</body>
